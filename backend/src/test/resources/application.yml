spring:
  datasource:
    url: jdbc:h2:mem:egetify_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  main:
    allow-bean-definition-overriding: true

app:
  youtube:
    api-key: FAKE_KEY_FOR_TESTS
    max-results: 5
  google:
    client-id: FAKE_CLIENT_ID
  jwt:
    secret: test-secret-key-for-bdd-tests-only-do-not-use-in-prod
    expiration-ms: 3600000

server:
  port: 8080
  servlet:
    context-path: /api
